# Python+Requests 接口自动化测试 - CI/CD 流水线 v2
# 修复：创建目录、容错处理、网络超时

name: API Test CI

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # 每天早上9点自动跑一次回归测试（北京时间UTC+8 = 1:00 UTC）
    - cron: '0 1 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  api-test:
    name: Run API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests>=2.31.0 pytest>=7.4.0 pytest-cov openpyxl fake-useragent

      - name: 📁 创建输出目录
        run: mkdir -p test-results reports

      - name: 🧪 运行接口自动化测试（pytest）
        id: run_tests
        continue-on-error: true
        run: |
          echo "============ 开始运行接口自动化测试 ============"
          echo ""
          echo "可用测试文件:"
          ls requests_day*.py 2>/dev/null || echo "无requests_day*.py文件"
          echo ""

          # 运行测试，设置超时和重试
          python -m pytest \
            requests_day5.py \
            requests_day6.py \
            requests_day7.py \
            requests_day8.py \
            requests_day9.py \
            requests_day10.py \
            requests_day11.py \
            requests_day12.py \
            requests_day13.py \
            requests_day14.py \
            -v --tb=short \
            --timeout=60 \
            -o addopts="" \
            2>&1 | tee test-results/pytest-log.txt || true

          # 统计结果
          if [ -f test-results/pytest-log.txt ]; then
            PASSED=$(grep -c "PASSED" test-results/pytest-log.txt || echo "0")
            FAILED=$(grep -c "FAILED\|ERROR" test-results/pytest-log.txt || echo "0")
            TOTAL=$(($PASSED + $FAILED))
            echo "passed=$PASSED failed=$FAILED total=$TOTAL" >> $GITHUB_OUTPUT
            echo ""
            echo "============ 测试结果统计 ============"
            echo "通过: $PASSED"
            echo "失败: $FAILED"
            echo "总计: $TOTAL"
          else
            echo "passed=0 failed=-1 total=0" >> $GITHUB_OUTPUT
          fi
          echo "============ 测试运行完成 ============"

      - name: 📊 生成测试摘要
        if: always()
        run: |
          echo "## 🧪 接口自动化测试报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**运行时间**: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f test-results/pytest-log.txt ]; then
            echo '### 测试日志' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat test-results/pytest-log.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📤 上传测试报告（Artifact）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 30

      - name: ✅ 测试通过检查
        if: steps.run_tests.outputs.failed == '0'
        run: |
          echo "🎉 所有接口测试通过！"
          echo "通过数: {{ steps.run_tests.outputs.passed }}"

      - name: ⚠️ 测试部分失败
        if: steps.run_tests.outputs.failed != '0'
        run: |
          echo "⚠️ 部分测试未通过，请查看上方日志详情"
          exit 1
