# Python+Requests 接口自动化测试 - CI/CD 流水线
# 功能：代码推送后自动运行所有接口测试，生成报告，失败时发通知

name: API Test CI

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # 每天早上9点自动跑一次回归测试（北京时间UTC+8 = 1:00 UTC）
    - cron: '0 1 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  api-test:
    name: Run API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧪 运行 Day5-14 接口自动化测试（pytest）
        id: run_tests
        continue-on-error: true
        run: |
          echo "============ 开始运行接口自动化测试 ============"
          python -m pytest requests_day5.py requests_day6.py requests_day7.py requests_day8.py requests_day9.py requests_day10.py requests_day11.py requests_day12.py requests_day13.py requests_day14.py -v --tb=short --junitxml=test-results/junit.xml 2>&1 | tee test-results/pytest-log.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
          echo "============ 测试运行完成 ============"

      - name: 📊 生成测试摘要
        if: always()
        run: |
          echo "## 🧪 接口自动化测试报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**运行时间**: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f test-results/pytest-log.txt ]; then
            echo "### 测试输出（最后50行）" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -50 test-results/pytest-log.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📤 上传测试报告（Artifact）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 30

      - name: ✅ 测试通过
        if: steps.run_tests.outcome == 'success'
        run: echo "🎉 所有接口测试通过！"

      - name: ❌ 测试失败
        if: steps.run_tests.outcome == 'failure'
        run: |
          echo "❌ 部分接口测试失败，请查看上方日志"
          exit 1
